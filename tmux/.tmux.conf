# remap prefix from 'C-b' to 'C-s'
unbind C-b
unbind C-s  
set-option -g prefix C-s
bind-key C-s send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

set -g allow-passthrough all
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'





# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows using Shift-arrow without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Increase the scrollback buffer to a higher limit than the default 2000 lines
set -g history-limit 9999999

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on
set -g set-clipboard on

# Enable vim keybinds to be used in copy mode
set-window-option -g mode-keys vi

# don't let programs rename windows via terminal-title escape sequences
set-option -g allow-rename off

# rename window to reflect current program
setw -g automatic-rename on
# manually-named windows keep their name (tmux disables auto-rename for them);
# unnamed windows fall back to the running command
setw -g automatic-rename-format '#{pane_current_command}'
# renumber windows when a window is closed
set -g renumber-windows on

set -g base-index 1
setw -g pane-base-index 1

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=yellow bold'

# panes
set -g pane-border-style 'fg=yellow'
set -g pane-active-border-style 'fg=green'

set -g terminal-features[3] "*:hyperlinks"
set -g terminal-features[4] "xterm-ghostty:extkeys"

# Allows for faster key repetition
# set -s escape-time 50
# Focus events allow tmux to detect when the terminal emulator window is focused or unfocused, enabling features 
set -g focus-events on

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=green'

set -g status-left ''
set -g status-left-length 10

setw -g window-status-current-style 'fg=black bg=green'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=green bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=black bg=yellow bold'

# messages
set -g message-style 'fg=black bg=yellow bold'

# resurrect and continuum options
set -g @continuum-restore 'off'
set -g @continuum-boot 'off';

set -g @resurrect-save-shell-history 'off'
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-dir '~/.cache/tmux/resurrect'
# pop ups

bind C-p display-popup -E "tmux new-session -A -s popup"

bind-key C-g run-shell '
  PANE="$(tmux show-option -gqv @ci_drawer_pane)"
  if [ -n "$PANE" ]; then
    tmux kill-pane -t "$PANE"
    tmux set-option -gu @ci_drawer_pane
  else
    pane_id=$(tmux split-window -v -l 10 -c "#{pane_current_path}" -P -F "##{pane_id}" "watch-ci-status")
    tmux select-pane -t "$pane_id"  -T "ci-drawer"
    tmux set-option -g @ci_drawer_pane "$pane_id"
  fi
'

# map the sequence Ghostty sends on cmd+k to User0, then bind it (no prefix)
# to the launcher popup. The launcher package is mac-only, so ~/.zsh/launcher.zsh
# is absent on ona/cde; there cmd+k stays unbound (no fallback). Evaluated at
# config-load time (presence is set by stow per host and stable per session).
# Bind in BOTH the root and off tables: an active ona session sits in dumb mode
# (key-table off, see below), where a root-only binding would be swallowed by
# the first keypress (resetting to root) and only fire on the second. Defined
# once as a %hidden var so the two binds stay in sync.
set -s user-keys[0] "\033[5002~"
%hidden LAUNCHER_POPUP="display-popup -w 90% -h 90% -E \"zsh -c 'source ~/.zsh/launcher.zsh && launcher'\""
if-shell '[ -r ~/.zsh/launcher.zsh ]' \
  "bind -n User0 ${LAUNCHER_POPUP} ; bind -T off User0 ${LAUNCHER_POPUP}"

# "Dumb terminal" mode: drop the local status bar, key tables, and prefix so
# every keystroke passes straight through (e.g. to a nested/remote tmux). The
# enable/disable sequences are defined once here as %hidden parse-time variables
# (expanded with ${...}; %hidden keeps them out of the environment passed to
# child processes) and referenced everywhere they're needed below. Keep the
# trailing `refresh-client -S` *inside* the variable: a `;` typed outside ${...}
# ends the bind, while the semicolons inside the value chain as bind commands.
%hidden DUMB_ON="set prefix None ; set key-table off ; set status off ; refresh-client -S"
%hidden DUMB_OFF="set -u prefix ; set -u key-table ; set -u status ; refresh-client -S"

# Press F12 to enter dumb mode; press F12 again (in the off table) to leave.
bind -T root C-F1 ${DUMB_ON}
bind -T off  C-F1 ${DUMB_OFF}

# Auto dumb mode for remote (ona/ssh) sessions. The ona launcher stamps each
# session it opens with the user option @is_remote (see launcher.d/ona.zsh). On
# focus-in to such a session, run the same DUMB_ON sequence so keys pass through
# to the remote tmux over ssh. prefix/status/key-table are session-scoped, so
# switching back to a local session restores them automatically -- no else
# branch is needed, which also means the manual F12 toggle in normal sessions is
# never undone on pane focus. F12 (C-F1) still works inside the remote session
# for temporary local control. Relies on `set -g focus-events on` above.
set-hook -g pane-focus-in "if-shell -F '#{@is_remote}' '${DUMB_ON}' ''"

# Stamp each window with the epoch it was last focused, so the launcher can sort
# windows MRU by *focus* (when you last looked at it) rather than by
# #{window_activity} (last output). tmux has no built-in last-focused timestamp,
# so we record it ourselves. -ga appends to the pane-focus-in hook array without
# clobbering the remote-mode command above. #{window_id} is expanded by tmux
# before the shell runs, so the stamp lands on the focused window. BSD date has
# no %N, so resolution is whole seconds (fine for MRU). Relies on focus-events on.
set-hook -ga pane-focus-in 'run-shell -b "tmux set-window-option -t \"#{window_id}\" @focus_ts $(date +%s)"'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# show the window name (#W), not the pane title (#T which catppuccin uses by default)
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# append the active pane's unique id (e.g. %18) to the session segment for quick
# reference when targeting panes (tmux ... -t %18). #{pane_id} resolves to the
# active pane at render time, so this works regardless of plugin load order.
set -g @catppuccin_session_text " #S #{pane_id}"
# status-interval is 15s and a pane switch doesn't force a status redraw, so the
# pane id above would go stale for up to 15s. Refresh the status line immediately
# on every pane select. after-select-pane covers all switch paths -- the M-arrow
# binds, mouse clicks, and vim-tmux-navigator all issue select-pane. Window
# switches already redraw the status, so they need no hook.
# plain -g (not -ga): re-sourcing on `prefix r` would otherwise stack a duplicate
# every reload. Nothing else hooks after-select-pane, so replacing index 0 is safe.
set-hook -g after-select-pane 'refresh-client -S'

# catppuccin v2 does NOT set status-right itself (and @catppuccin_status_modules_right
# from v0.x is a no-op). You must assemble it manually AFTER the plugin loads, else
# tmux falls back to its default status-right which ends in `%H:%M %d-%b-%y` (the date).
# Modules are exposed as #{E:@catppuccin_status_<module>} (see status/*.conf).
# NB: append WITHOUT -F. The -F flag expands the format at set-time and stores the
# frozen result, which bakes #{pane_id} (and directory) to a literal at config-load
# and they never refresh. Plain -ag stores the literal #{E:...} so tmux re-expands
# it on every status render. (catppuccin's README only uses -F for cpu/battery.)
set -g status-right-length 100
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# CDE/ona override: must come AFTER the catppuccin status-right assembly above,
# else that block clobbers it. tmux if-shell with a literal test runs inline at
# this position, so order is what wins. Also lands after catppuccin loads (the
# cde status-right references @catppuccin_* color vars).
if-shell '[ "$USER" = "vscode" ]' {
    source-file ~/tmux.cde.conf
}


run '~/.tmux/plugins/tpm/tpm'
