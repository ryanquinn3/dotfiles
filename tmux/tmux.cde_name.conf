# vim:set ft=tmux:
# Catppuccin status module for the CDE/ona display name. @cde_display_name is
# resolved once at config-load by tmux.cde.conf (static for the session), so
# this module just wraps that cached value with catppuccin's icon/color/
# separator styling -- same pattern as catppuccin's own status/session.conf.
# No -o (only-if-unset): these are our own module defaults, not user
# overrides, so a `prefix r` reload must always apply the current value --
# -o would leave a long-lived server stuck on whatever was set at its first
# load, silently ignoring later edits to this file.
%hidden MODULE_NAME="cde_name"

set -gq "@catppuccin_${MODULE_NAME}_icon" "󰵮 "
set -gqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_blue}"
set -gq "@catppuccin_${MODULE_NAME}_text" " #{@cde_display_name}"

source -F "~/.tmux/plugins/catppuccin/tmux/utils/status_module.conf"
