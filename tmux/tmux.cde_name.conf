# vim:set ft=tmux:
# Catppuccin status module for the CDE/ona display name. @cde_display_name is
# resolved once at config-load by tmux.cde.conf (static for the session), so
# this module just wraps that cached value with catppuccin's icon/color/
# separator styling -- same pattern as catppuccin's own status/session.conf.
%hidden MODULE_NAME="cde_name"

set -ogq "@catppuccin_${MODULE_NAME}_icon" "󰵮 "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_blue}"
set -ogq "@catppuccin_${MODULE_NAME}_text" "#{@cde_display_name}"

source -F "~/.tmux/plugins/catppuccin/tmux/utils/status_module.conf"
