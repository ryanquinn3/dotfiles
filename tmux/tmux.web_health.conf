# vim:set ft=tmux:
# Catppuccin status module for the web service health check. Unlike
# cde_name's cached value, health can change between renders, so _color stays
# a live #(...) call (no -F flag) re-evaluated every status-interval. The
# icon/text are static; svc-health only reports up/down via its exit code.
%hidden MODULE_NAME="web_health"

set -ogq "@catppuccin_${MODULE_NAME}_icon" " "
set -ogq "@catppuccin_${MODULE_NAME}_color" \
  "#{?#(svc-health web.internal 80 >/dev/null 2>&1 && echo 1),#{E:@thm_green},#{E:@thm_red}}"
set -ogq "@catppuccin_${MODULE_NAME}_text" " web"

source -F "~/.tmux/plugins/catppuccin/tmux/utils/status_module.conf"
