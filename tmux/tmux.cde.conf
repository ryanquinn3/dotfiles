set -g status-interval 5

# Resolve the CDE display name once at config-load into a user option. It's
# static for the whole session, so #(...) directly in status-right would
# re-spawn a process every status-interval for a value that never changes.
# run-shell (foreground) sets it before the status first renders; re-runs on
# `prefix r`. cde-display-name (bin/.local/bin) prefers the ona env name,
# falling back to the id's prefix before the first hyphen.
run-shell 'tmux set -g @cde_display_name "$(cde-display-name)"'

# Prepend the cde items to the LEFT of the status-right already assembled in
# .tmux.conf (catppuccin directory + session). This file is sourced AFTER that
# assembly, so #{status-right} here holds the base value. Stash it with -F, which
# bakes ONLY this #{status-right} reference and leaves the inner #{E:...} module
# refs literal; then rebuild: cde items first, base modules last. Re-expanding the
# stash via #{E:@_base_sr} keeps the base modules live at render time.
# Idempotent on `prefix r`: the base block resets status-right before this runs.
set -gqF @_base_sr "#{status-right}"
set -g status-right ""
set -ag status-right '#{?#{@cde_display_name},#{@cde_display_name} ,}#(~/.local/bin/svc-health -u http://$(docker compose port )/health -n web -t 500) '
set -ag status-right "#{E:@_base_sr}"

# pop ups

