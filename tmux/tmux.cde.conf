set -g status-interval 5

# Resolve the CDE id once at config-load into a user option. The id is static for
# the whole session, so #(ona ...) directly in status-right would re-spawn a
# ~100ms process every status-interval for a value that never changes. run-shell
# (foreground) sets it before the status first renders; re-runs on `prefix r`.
run-shell 'tmux set -g @cde_display_name "$(ona environment get -f Id)"'

# Prepend the cde items to the LEFT of the status-right already assembled in
# .tmux.conf (catppuccin directory + session). This file is sourced AFTER that
# assembly, so #{status-right} here holds the base value. Stash it with -F, which
# bakes ONLY this #{status-right} reference and leaves the inner #{E:...} module
# refs literal; then rebuild: cde items first, base modules last. Re-expanding the
# stash via #{E:@_base_sr} keeps the base modules live at render time.
# Idempotent on `prefix r`: the base block resets status-right before this runs.
set -gqF @_base_sr "#{status-right}"
set -g status-right ""
set -ag status-right '#{?#{@cde_display_name},#{@cde_display_name} ,}#(~/.local/bin/svc-health -u http://127.0.0.1:8081/health -n web -t 500) '
set -ag status-right "#{E:@_base_sr}"

# pop ups

